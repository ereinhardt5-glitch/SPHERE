<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Sphere</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}
.wheel {
  width: 90vmin;
  height: 90vmin;
  max-width: 750px;
  max-height: 750px;
  border-radius: 50%;
  animation: spin 60s linear infinite;
  filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
  <img class="wheel" src="Cohesion_Org_Chart_Rings (3) 1 (1) (1).png" alt="Project Sphere">
</body>
</html>
